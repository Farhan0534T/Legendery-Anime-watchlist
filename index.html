<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legendary Anime Watchlist</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <h1>🎌 Legendary Anime Watchlist</h1>

    <p>
        Save your favorite anime and share them with everyone.
    </p>

</header>

<main class="container">

    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Anime..."
        >

    </section>

    <section class="add-section">

        <input
            type="text"
            id="animeInput"
            placeholder="Anime Name"
        >

        <button id="addBtn">
            Add Anime
        </button>

    </section>

    <section id="animeList">

    </section>

</main>

<script type="module" src="script.js"></script>

</body>
</html>
